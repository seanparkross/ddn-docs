# Connector Docs DRI Reviewer Workflow
#
# This workflow automatically assigns the Connector DRI to the PR for any edits to the connector docs.
#
# How it works:
# 1. Get the list of changed files in the PR
# 2. For each changed file, check if it's a connector doc and extract the connector folder name
# 3. Query the Hasura docs-services API to find the DRI for each connector folder
# 4. Collect all unique DRIs from the API responses
# 5. Request a review from all identified DRIs on the PR

name: Connector Docs DRI Reviewer

on:
  pull_request_target:
    branches:
      - main
    types: [opened, synchronize, reopened]
    paths:
      - 'docs/reference/connectors/**'
  workflow_dispatch:

jobs:
  connector-docs-dri-reviewer:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{github.event.pull_request.head.ref}}
          repository: ${{github.event.pull_request.head.repo.full_name}}
          fetch-depth: 1

      - name: Get changed connector docs
        id: changed_connector_files
        uses: tj-actions/changed-files@v44
        with:
          files: docs/reference/connectors/**

      - name: Setup Node.js
        if: steps.changed_connector_files.outputs.all_modified_files != ''
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        if: steps.changed_connector_files.outputs.all_modified_files != ''
        working-directory: utilities/connector-dri-pr-reviewer
        run: npm ci

      - name: Run DRI reviewer script
        if: steps.changed_connector_files.outputs.all_modified_files != ''
        id: find_dris
        uses: actions/github-script@v7
        with:
          github-token: ${{secrets.DOCS_GITHUB_TOKEN}}
          script: |
            const { assignDRIReviewers } = require('${{ github.workspace }}/utilities/connector-dri-reviewer/connector-dri-reviewer.ts');
            const core = require('@actions/core');

            // Set the changed files as input
            core.saveState('changed_files', '${{ steps.changed_connector_files.outputs.all_modified_files }}');
            core.exportVariable('INPUT_CHANGED_FILES', '${{ steps.changed_connector_files.outputs.all_modified_files }}');

            await assignDRIReviewers();

            // Get the reviewers output and return it
            const reviewersJson = core.getState('reviewers');
            return reviewersJson ? JSON.parse(reviewersJson) : [];

      - name: Request reviews from DRIs
        if: steps.changed_connector_files.outputs.all_modified_files != '' && steps.find_dris.outputs.result != '[]'
        uses: actions/github-script@v7
        with:
          github-token: ${{secrets.DOCS_GITHUB_TOKEN}}
          script: |
            const reviewers = ${{ steps.find_dris.outputs.result }};
            if (reviewers && reviewers.length > 0) {
              console.log(`Requesting review from DRIs: ${reviewers.join(', ')} on PR #${context.issue.number}`);
              const response = await github.rest.pulls.requestReviewers({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.issue.number,
                reviewers: reviewers
              });
              console.log("Done requesting reviews from DRIs.");
            } else {
              console.log("No DRIs found to request a review for the changed files.");
            }
